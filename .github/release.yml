changelog:
  categories:
    - title: New Features
      labels: [enhancement, feature]
    - title: Bug Fixes
      labels: [bug, fix]
    - title: Improvements
      labels: [improvement, refactor]
    - title: Documentation
      labels: [documentation, docs]
    - title: Other Changes
      labels: ["*"]
  exclude:
    labels: [skip-changelog]
